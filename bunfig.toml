[install]
# 7-day supply-chain guard: skip package versions published less than 7 days ago.
# Rationale: recent npm supply-chain attacks (TanStack, node-ipc, others) were
# caught + advised + unpublished within hours-to-days. 7 days gives the ecosystem
# time to detect and the registry time to unpublish before we install.
# 604800 seconds = 7 days.
minimumReleaseAge = 604800

# Bypass-list MUST stay empty unless the user has explicitly approved each entry
# AFTER reviewing why a freshly-published version is required. Document the
# reason in the commit message that adds the entry.
minimumReleaseAgeExcludes = []
